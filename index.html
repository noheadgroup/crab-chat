<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦀 Chat with Crab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 16px; text-align: center; border-bottom: 2px solid #0f3460; }
header h1 { font-size: 18px; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
.msg.user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.crab { background: #533483; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg .time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
#input-area { display: flex; padding: 12px; gap: 8px; background: #16213e; border-top: 2px solid #0f3460; }
#input-area input { flex: 1; padding: 10px 14px; border: none; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; }
#input-area button { padding: 10px 20px; border: none; border-radius: 8px; background: #533483; color: #eee; font-size: 14px; cursor: pointer; }
#input-area button:hover { background: #6a42a0; }
.status { text-align: center; padding: 4px; font-size: 11px; opacity: 0.5; }
</style>
</head>
<body>
<header><h1>🦀 Chat with Crab</h1></header>
<div class="status" id="status">connecting...</div>
<div id="messages"></div>
<div id="input-area">
  <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
  <button onclick="sendMsg()">Send</button>
</div>
<script>
const API = 'https://crab-chat-zvil.onrender.com';
const USER_ID = 'nail';
const messagesDiv = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const statusEl = document.getElementById('status');
let lastId = 0;

function addMsg(text, sender, time) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.innerHTML = text + (time ? '<div class="time">' + time + '</div>' : '');
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  addMsg(text, 'user', new Date().toLocaleTimeString());
  try {
    await fetch(API + '/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user: USER_ID, text})
    });
  } catch(e) { statusEl.textContent = 'send failed'; }
}

async function poll() {
  try {
    const res = await fetch(API + '/poll?user=' + USER_ID + '&after=' + lastId);
    const data = await res.json();
    statusEl.textContent = 'connected';
    if (data.messages) {
      data.messages.forEach(m => {
        addMsg(m.text, m.sender, m.time);
        if (m.id > lastId) lastId = m.id;
      });
    }
  } catch(e) { statusEl.textContent = 'reconnecting...'; }
}

msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
setInterval(poll, 3000);
poll();
</script>
</body>
</html>
